name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # reused as the release gate (see release.yml)

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm install -g @fission-ai/openspec@1.6.0
      - run: openspec validate --all

  # Dogfood concord on its own specs via the first-party actions. They install
  # the published CLI, so this gates against the latest release, not the working
  # tree. The published 0.1.0 predates the combined `ci` command, so run the
  # `check` and `overlap` actions (the same two analyses) rather than `ci`.
  # `concord check` needs a base branch to diff against, which only exists on a
  # PR or a main push — skip on tag/release-gate calls (detached HEAD, no base).
  concord:
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # concord check reconstructs the merge-base from history
      - uses: ./actions/check
      - uses: ./actions/overlap

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20.19.0', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
